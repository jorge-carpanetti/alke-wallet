<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container mt-5">

    <div class="card">

        <div class="card-body">

            <h5 class="font-weight-bold">Agenda de Contactos</h5>
            <p class="text-muted small">Agrega un nuevo contacto o selecciona uno guardado para enviarle dinero.</p>

            <div class="input-group mb-3">
                <input type="text" id="nuevoContacto" class="form-control" placeholder="Nombre del nuevo contacto">
                <div class="input-group-append">
                    <button id="btnAgregarContacto" class="btn btn-success" type="button">Agregar nuevo contacto</button>
                </div>
            </div>

            <label>Mis contactos</label>
            <div id="listaContactos" class="list-group mb-3"></div>

            <hr class="my-4">

            <h2 class="text-center mb-4">
                Transferencia
            </h2>

            <form id="sendForm">

                <div class="form-group autocomplete-container">
                    <label>
                        Contacto destino
                    </label>
                    <input type="text" id="contacto" class="form-control" placeholder="Nombre contacto" required autocomplete="off">
                    <div id="sugerencias" class="list-group autocomplete-suggestions"></div>
                </div>

                <div class="form-group">
                    <label>
                        Monto ($CLP)
                    </label>
                    <input type="number" id="montoEnviar" class="form-control" min="1" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Enviar Dinero
                </button>

            </form>

            <div id="resultado" class="mt-3 text-center">
            </div>

            <a href="menu.html" class="btn btn-secondary btn-block mt-3">
                Volver al Menú
            </a>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
<script src="js/sendmoney.js"></script>

</body>
</html>
